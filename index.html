<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maimai スコア計算ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>maimai スコア計算ツール</h1>
    <h2>1, 定数を選ぶ</h2>
    <p>レベルを押すと細かい定数が表示されます。</p>

    <div id="constants">
        <button id="tB15" class="level-btn">15</button>
        <button id="tB14+" class="level-btn">14+</button>
        <button id="tB14" class="level-btn">14</button>
        <button id="tB13+" class="level-btn">13+</button>
        <button id="tB13" class="level-btn">13</button>
        <button id="tB12+" class="level-btn">12+</button>
        <button id="tB12" class="level-btn">12</button>
        <button id="tB11+" class="level-btn">11+</button>
        <button id="tB11" class="level-btn">11</button>
        <button id="tB10+" class="level-btn">10+</button>
        <button id="tB10" class="level-btn">10</button>

        <div style="display: none;">
            <div id="tE15"><button>15.0</button></div>
            <div id="tE14+"><button>14.6</button><button>14.7</button><button>14.8</button><button>14.9</button></div>
            <div id="tE14"><button>14.0</button><button>14.1</button><button>14.2</button><button>14.3</button><button>14.4</button><button>14.5</button></div>
            <div id="tE13+"><button>13.6</button><button>13.7</button><button>13.8</button><button>13.9</button></div>
            <div id="tE13"><button>13.0</button><button>13.1</button><button>13.2</button><button>13.3</button><button>13.4</button><button>13.5</button></div>
            <div id="tE12+"><button>12.6</button><button>12.7</button><button>12.8</button><button>12.9</button></div>
            <div id="tE12"><button>12.0</button><button>12.1</button><button>12.2</button><button>12.3</button><button>12.4</button><button>12.5</button></div>
            <div id="tE11+"><button>11.6</button><button>11.7</button><button>11.8</button><button>11.9</button></div>
            <div id="tE11"><button>11.0</button><button>11.1</button><button>11.2</button><button>11.3</button><button>11.4</button><button>11.5</button></div>
            <div id="tE10+"><button>10.6</button><button>10.7</button><button>10.8</button><button>10.9</button></div>
            <div id="tE10"><button>10.0</button><button>10.1</button><button>10.2</button><button>10.3</button><button>10.4</button><button>10.5</button></div>
        </div>
    </div>

    <h2>2, スコアを選ぶ</h2>
    <label for="score">スコア:</label>
    <select name="score" id="score">
        <option value="AP">AP</option>
        <option value="SSS+">SSS+</option>
        <option value="SSS">SSS</option>
        <option value="SS+">SS+</option>
        <option value="SS">SS</option>
        <option value="S+">S+</option>
        <option value="S">S</option>
    </select>

    <div id="overlay" class="overlay">
        <div id="modal-content" class="modal-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
